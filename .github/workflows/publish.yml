name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ github.event.inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -m "v${VERSION}"
          git tag "v${VERSION}"

      # Push uses DEPLOY_KEY (SSH deploy key with write access, added as bypass actor in the
      # branch ruleset) to push past the "changes must be made through a pull request" rule.
      # Alternative: create a GitHub App, grant it bypass rights, and use
      # actions/create-github-app-token@v1 to generate a token for checkout and push.
      # See: https://github.com/orgs/community/discussions/25305#discussioncomment-8256560
      - name: Push commit and tag
        run: git push --follow-tags

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
